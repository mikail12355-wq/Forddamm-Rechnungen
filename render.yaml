services:
  - type: web
    name: forddamm-rechnungen
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/data/forddamm.db
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: Forddamm2024!
